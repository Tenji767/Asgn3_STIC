<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!--Make it mobile sized-->
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>

  <body>
    <header>
      <h1>The Weather Man Returns...</h1>
    </header>

    <!-- search -->
    <section class="search-section">
      <input id="locationinput" type="text" placeholder="Enter city name here" />
      <button id="searchWeather">Search</button>
    </section>
    
      <!-- daily weather -->
      <section class="daily-section">
        <h2>Daily Forecast</h2>
        <div id="dailyWeather">
          <h1 id="currentTemp"></h1>
          
        </div>
      </section>

    <main>
      <!-- hourly weather -->
      <section class="weather-section">
        <h2>Hourly Weather</h2>
        <div id="weathercard" class="weather-grid"></div>
      </section>


      <!-- weather alerts -->
      <section class="alert-section">
        <h2>Weather Alerts</h2>
        <div id="weatherAlerts">
          <p>No alerts currently displayed.</p>
        </div>
      </section>

      <!-- radar map -->
      <section class="radar-section">
        <h2>Weather Radar</h2>
        <div class="radar-placeholder">Radar map will appear here.</div>
      </section>
    </main>
  </body>
</html>
