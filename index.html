<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!--Make it mobile sized-->
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>

  <body>
    <header>
      <h1>The Weather Man Returns...</h1>
    </header>

    <!-- search -->
    <section class="search-section">
      <input
        id="locationinput"
        type="text"
        placeholder="Enter city name here"
      />
      <button id="searchWeather">Search</button>
    </section>

    <main>
      <!-- hourly weather -->
      <section class="weather-section">
        <h2>Hourly Weather</h2>
        <div id="weathercard" class="weather-grid"></div>
      </section>

      <!-- daily weather -->
      <!-- add humidity and visibility -->
      <section class="daily-section">
        <h2>Daily Forecast</h2>
        <div id="dailyWeather">
          <p>Daily forecast will appear here.</p>
        </div>
      </section>

      <!-- weather alerts -->
      <section class="alert-section">
        <h2>Weather Alerts</h2>
        <div id="weatherAlerts">
          <p>No alerts currently displayed.</p>
        </div>
      </section>

      <!-- radar map -->

      <section class="radar-section">
        <h2>Weather Radar</h2>
        <div id="map"></div>
      </section>
    </main>
  </body>
</html>
