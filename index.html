<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <!--Make it mobile sized-->
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  </head>

  <body>
    <header>
      <h1>The Weather Man Returns...</h1>
    </header>

    <!-- search -->
    <section class="search-section">
      <input
        id="locationinput"
        type="text"
        placeholder="Enter city name here"
      />
      <button id="searchWeather">Search</button>
    </section>

    <main>
      <!-- daily weather -->
      <section class="daily-section">
        <h2>Current Weather</h2>
        <div id="dailyWeather">
          <h1 id="currentTemp"></h1>

          <div id="minmax"></div>
          <div id="weatherDetails">
          <p>Humidity: <span id="humidityValue">--</span></p>
          <p>Visibility: <span id="visibilityValue">--</span></p>
        </div>
        </div>
      </section>


      <!-- hourly weather -->
      <section class="weather-section">
        <h2>Hourly Weather</h2>
        <div id="weathercard" class="weather-grid"></div>
      </section>


<!-- Actual daily weather -->
 <section class="weekly-section">
  <h2>Weekly Weather</h2>
  
    <div id="weeklyweathercard" class="weather-grid"></div>
  
 </section>

      <!-- weather alerts -->
      <section class="alert-section">
        <h2>Weather Alerts</h2>
        <div id="weatherAlerts">
          <p>No alerts currently displayed.</p>
        </div>
      </section>

      <!-- radar map -->

      <section class="radar-section">
        <h2>Weather Radar</h2>
        <div id="map"></div>
      </section>
    </main>
  </body>
</html>
